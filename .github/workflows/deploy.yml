name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare output
        run: |
          mkdir -p output
          cp -r * output/ || true
          rm -f output/.github
          rm -rf output/.github

      - name: Rewrite absolute /assets/ refs to relative (GitHub Pages project site)
        run: |
          find output -maxdepth 2 -name 'index.html' -exec sed -i \
            -e 's|"/assets/|"./assets/|g' \
            -e "s|'/assets/|'./assets/|g" {} +
          # vite `__vitePreload` builds chunk URLs as `base + dep` where base is
          # baked in at build time. Prebuilt bundles default to base "/" and ship
          # a tiny helper:  function(x){return"/"+x}  — that prefix breaks under
          # GitHub Pages project paths (/pages-<slug>/...). Rewrite that single
          # helper signature so chunks resolve relative to the document URL.
          find output -name '*.js' -exec sed -i -E \
            's|function\(([a-z_$])\)\{return"/"\+\1\}|function(\1){return"./"+\1}|g' {} +

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
